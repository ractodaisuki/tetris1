<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>Pyxel Tetris</title>
  <script src="https://cdn.jsdelivr.net/gh/kitao/pyxel@2.8.10/wasm/pyxel.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #11151c;
      --panel: #1d2430cc;
      --line: #324156;
      --text: #f4f7fb;
      --muted: #a7b4c7;
      --accent-a: #3f8cff;
      --accent-b: #ff8f3f;
      --accent-c: #34c48b;
      --accent-d: #db5a7a;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top, #233047 0%, #11151c 58%),
        var(--bg);
      color: var(--text);
      font-family: monospace;
      touch-action: manipulation;
    }

    body {
      position: relative;
    }

    div#pyxel-screen {
      position: absolute;
      inset: 0 0 172px 0;
      width: 100%;
      height: auto;
      background: transparent;
    }

    canvas#canvas {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .hud {
      position: fixed;
      top: env(safe-area-inset-top, 0);
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      padding: 10px 12px 0;
      pointer-events: none;
      z-index: 5;
      font-size: 11px;
      color: var(--muted);
      text-shadow: 0 1px 0 #000;
    }

    .controls {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      padding:
        10px 12px calc(10px + env(safe-area-inset-bottom, 0));
      background: linear-gradient(180deg, transparent 0, var(--panel) 28%, #121923f2 100%);
      border-top: 1px solid var(--line);
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 12px;
      z-index: 10;
    }

    .pad,
    .actions {
      display: grid;
      gap: 10px;
    }

    .pad {
      grid-template-columns: repeat(3, 1fr);
      grid-template-areas:
        ". up ."
        "left down right";
      align-items: end;
    }

    .actions {
      grid-template-columns: repeat(2, 1fr);
      align-content: end;
    }

    .btn {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 16px;
      min-height: 48px;
      padding: 0 10px;
      color: var(--text);
      background: #202938;
      box-shadow: inset 0 -4px 0 #0d1219;
      font: 700 15px/1 monospace;
      touch-action: none;
      user-select: none;
    }

    .btn:active,
    .btn.active {
      transform: translateY(2px);
      box-shadow: inset 0 -1px 0 #0d1219;
      filter: brightness(1.1);
    }

    .up { grid-area: up; }
    .left { grid-area: left; }
    .right { grid-area: right; }
    .down { grid-area: down; }

    .rot-l { background: color-mix(in srgb, var(--accent-a) 26%, #202938); }
    .rot-r { background: color-mix(in srgb, var(--accent-b) 28%, #202938); }
    .drop { background: color-mix(in srgb, var(--accent-c) 26%, #202938); }
    .reset { background: color-mix(in srgb, var(--accent-d) 26%, #202938); }

    .hint {
      grid-column: 1 / -1;
      text-align: center;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.4;
    }

    @media (min-width: 900px) {
      div#pyxel-screen {
        inset: 0 0 132px 0;
      }

      .controls {
        grid-template-columns: 340px 300px;
        justify-content: space-between;
        padding-left: 20px;
        padding-right: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="hud">
    <span>SMARTPHONE MODE</span>
    <span>KEYBOARD ALSO AVAILABLE</span>
  </div>

  <pyxel-play name="docs.pyxapp"></pyxel-play>

  <div class="controls">
    <div class="pad">
      <button class="btn up" data-code="ArrowUp" data-key="ArrowUp" data-keycode="38">UP</button>
      <button class="btn left" data-code="ArrowLeft" data-key="ArrowLeft" data-keycode="37">LEFT</button>
      <button class="btn down" data-code="ArrowDown" data-key="ArrowDown" data-keycode="40">DOWN</button>
      <button class="btn right" data-code="ArrowRight" data-key="ArrowRight" data-keycode="39">RIGHT</button>
    </div>

    <div class="actions">
      <button class="btn rot-l" data-code="KeyZ" data-key="z" data-keycode="90">ROT L</button>
      <button class="btn rot-r" data-code="KeyX" data-key="x" data-keycode="88">ROT R</button>
      <button class="btn drop" data-code="Space" data-key=" " data-keycode="32">HARD</button>
      <button class="btn reset" data-code="KeyR" data-key="r" data-keycode="82">RESET</button>
      <div class="hint">UP or HARD for instant drop / RESET to restart</div>
    </div>
  </div>

  <script>
    const activeButtons = new Map();

    function dispatchKey(type, code, key, keyCode) {
      document.dispatchEvent(new KeyboardEvent(type, {
        key,
        code,
        keyCode,
        which: keyCode,
        bubbles: true,
        cancelable: true,
      }));
    }

    function releaseButton(button) {
      const state = activeButtons.get(button);
      if (!state) {
        return;
      }
      activeButtons.delete(button);
      button.classList.remove("active");
      dispatchKey("keyup", state.code, state.key, state.keyCode);
    }

    function pressButton(button) {
      if (activeButtons.has(button)) {
        return;
      }
      const state = {
        code: button.dataset.code,
        key: button.dataset.key,
        keyCode: Number(button.dataset.keycode),
      };
      activeButtons.set(button, state);
      button.classList.add("active");
      dispatchKey("keydown", state.code, state.key, state.keyCode);
    }

    function bindButton(button) {
      const stop = (event) => {
        event.preventDefault();
        event.stopPropagation();
      };

      button.addEventListener("pointerdown", (event) => {
        stop(event);
        pressButton(button);
      });

      button.addEventListener("pointerup", (event) => {
        stop(event);
        releaseButton(button);
      });

      button.addEventListener("pointercancel", (event) => {
        stop(event);
        releaseButton(button);
      });

      button.addEventListener("pointerleave", (event) => {
        if (event.buttons !== 1) {
          return;
        }
        stop(event);
        releaseButton(button);
      });
    }

    document.querySelectorAll(".btn[data-code]").forEach(bindButton);
    window.addEventListener("blur", () => {
      [...activeButtons.keys()].forEach(releaseButton);
    });
  </script>
</body>
</html>
